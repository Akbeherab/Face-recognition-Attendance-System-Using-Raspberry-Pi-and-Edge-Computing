{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="card shadow">
                <div class="card-body">
                    <h2 class="card-title text-center mb-4">System Settings</h2>
                    
                    <form method="POST">
                        <div class="mb-3">
                            <label for="time_limit" class="form-label">Attendance Time Limit</label>
                            <input type="time" class="form-control" id="time_limit" name="time_limit" 
                                   value="{{ current_time_limit }}" required>
                            <div class="form-text">Students marked after this time will be considered "Late"</div>
                        </div>
                        
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">Save Settings</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
